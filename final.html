<!DOCTYPE html>
<html>
<head>

<title>Final Selection</title>

<style>

body{
font-family:Arial;
background:#071021;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
}

th,td{
border:1px solid #3a6ff7;
padding:10px;
}

button{
padding:10px 20px;
margin:10px;
background:#3a6ff7;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Final Selection</h2>

<table>

<tr>
<th>Refer</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
</tr>

<tbody id="finalList"></tbody>

</table>

<br>

<button onclick="location.href='index.html'">Back</button>

<script>

let pass=JSON.parse(localStorage.getItem("pass")) || [];

let table=document.getElementById("finalList");

pass.forEach((c,index)=>{

let row=document.createElement("tr");

row.innerHTML=`

<td>
<input type="checkbox" onclick="referCandidate(${index})">
</td>

<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
<td id="status${index}">${c.referred || "Pending"}</td>

`;

table.appendChild(row);

});

function referCandidate(index){

let pass=JSON.parse(localStorage.getItem("pass")) || [];

pass[index].referred="Referred";

localStorage.setItem("pass",JSON.stringify(pass));

document.getElementById("status"+index).innerText="Referred";

}

</script>

</body>
</html>
