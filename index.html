<!DOCTYPE html>
<html>

<head>

<title>Recruitment Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
text-align:center;
}

h1{
margin-top:60px;
font-size:40px;
}

.dashboard{
margin-top:40px;
}

.dashboard a{
text-decoration:none;
}

.dashboard button{

background:#3a6ff7;
border:none;
color:white;
padding:12px 25px;
margin:10px;
font-size:16px;
cursor:pointer;
border-radius:5px;

}

.dashboard button:hover{
background:#2b52c9;
}

.reset-btn{
margin-top:30px;
background:#ff4444;
}

.reset-btn:hover{
background:#cc0000;
}

</style>

</head>


<body>

<h1>Recruitment Dashboard</h1>

<div class="dashboard">

<a href="running.html">
<button>🏃 Running Test</button>
</a>

<a href="health.html">
<button>🏥 Health Test</button>
</a>

<a href="written.html">
<button>📚 Written Exam</button>
</a>

<a href="final.html">
<button>⭐ Final Selection</button>
</a>

<a href="pass.html">
<button>✅ Pass List</button>
</a>

<a href="fail.html">
<button>❌ Fail List</button>
</a>

<br><br>

<button class="reset-btn" onclick="resetSystem()">
⚠ Reset Recruitment
</button>

</div>


<script>

function resetSystem(){

if(confirm("Are you sure you want to reset all recruitment data?")){

localStorage.clear()

alert("All recruitment data cleared")

location.reload()

}

}

</script>

</body>

</html>
