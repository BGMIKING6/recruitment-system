<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF‑8">
<meta name="viewport" content="width=device‑width, initial‑scale=1.0">
<title>Running Test</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: 'Roboto', sans‑serif;
  background: linear-gradient(160deg, #0a1f3d, #071021);
  color: white;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 2rem;
  text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
}

table {
  width: 100%;
  max-width: 1000px;
  margin: auto;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #3a6ff7;
  padding: 10px;
  text-align: center;
}

th {
  background: #3a6ff7;
  color: white;
}

td img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
}

.pass {
  background-color: rgba(0, 200, 0, 0.2);
}

.fail {
  background-color: rgba(200, 0, 0, 0.2);
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.pass-btn {
  background: #00c851;
  color: white;
}

.pass-btn:hover {
  background: #009933;
}

.fail-btn {
  background: #ff4444;
  color: white;
}

.fail-btn:hover {
  background: #cc0000;
}

.back-btn {
  margin-top: 25px;
  padding: 10px 20px;
  background: #3a6ff7;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

@media screen and (max-width: 480px) {
  h1 { font-size: 1.5rem; }
  th, td { padding: 6px; font-size: 12px; }
  td img { width: 40px; height: 40px; }
  button { padding: 4px 8px; font-size: 12px; }
  .back-btn { font-size: 14px; padding: 8px 16px; }
}
</style>
</head>

<body>

<h1>Running Test</h1>

<table>
  <thead>
    <tr>
      <th>Photo</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Qualification</th>
      <th>State</th>
      <th>Pass / Fail</th>
    </tr>
  </thead>
  <tbody id="candidateList"></tbody>
</table>

<button class="back-btn" onclick="location.href='index.html'">← Back to Dashboard</button>

<script>
// 🧠 Your published CSV link
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR88e0hhFWtk04HNqYLGnkZajSAH0IvZgmjtTAiRpSttpjQ9F3Ck7KRlldKflUX60xF5eB0OZe0YZkz/pub?gid=1204590268&single=true&output=csv";

let candidates = [];

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    let rows = data.split("\n").slice(1); // skip headers
    rows.forEach(r => {
      let cols = r.split(",");

      // skip if empty
      if(!cols[1]) return;

      // 📍 Adjust column indexes based on your sheet
      candidates.push({
        name: cols[1] || "",
        phone: cols[2] || "",
        email: cols[3] || "",
        photo: cols[4] || "https://via.placeholder.com/50",
        qualification: cols[5] || "",
        state: cols[6] || "",
        running: "" // will be set pass/fail
      });
    });

    renderCandidates();
  });

function renderCandidates() {
  let tbody = document.getElementById("candidateList");
  tbody.innerHTML = "";

  candidates.forEach((c, i) => {
    let tr = document.createElement("tr");
    tr.id = `row${i}`;
    tr.innerHTML = `
      <td><img src="${c.photo}" alt="Photo"></td>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.qualification}</td>
      <td>${c.state}</td>
      <td>
        <button class="pass-btn" onclick="passCandidate(${i})">Pass</button>
        <button class="fail-btn" onclick="failCandidate(${i})">Fail</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function passCandidate(i) {
  candidates[i].running = "Pass";
  localStorage.setItem("candidates", JSON.stringify(candidates));
  document.getElementById(`row${i}`).classList.add("pass");
}

function failCandidate(i) {
  candidates[i].running = "Fail";
  localStorage.setItem("candidates", JSON.stringify(candidates));
  document.getElementById(`row${i}`).classList.add("fail");
}
</script>

</body>
</html>
