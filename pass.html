<!DOCTYPE html>
<html>
<head>
<title>Pass Candidates</title>
<style>
body{
font-family:Arial;
background:#071021;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid #3a6ff7;
padding:10px;
}

button{
padding:10px 20px;
margin:10px;
background:#3a6ff7;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Passed Candidates</h2>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Running</th>
</tr>

<tbody id="passList"></tbody>

</table>

<br>

<button onclick="location.href='index.html'">Back</button>

<script>

let pass=JSON.parse(localStorage.getItem("pass")) || [];

let table=document.getElementById("passList");

pass.forEach(c=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
<td>${c.running}</td>
`;

table.appendChild(row);

});

</script>

</body>
</html>
