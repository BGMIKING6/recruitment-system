<!DOCTYPE html>
<html>
<head>
<title>Failed Candidates</title>
<style>
body{
font-family:Arial;
background:#071021;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid red;
padding:10px;
}

button{
padding:10px 20px;
margin:10px;
background:#3a6ff7;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Failed Candidates</h2>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Reason</th>
</tr>

<tbody id="failList"></tbody>

</table>

<br>

<button onclick="location.href='running.html'">Back</button>

<script>

let fail=JSON.parse(localStorage.getItem("fail")) || [];

let table=document.getElementById("failList");

fail.forEach(c=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
<td>${c.reason}</td>
`;

table.appendChild(row);

});

</script>

</body>
</html>
